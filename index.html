<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Timezones</title>
  <style>
    :root{
      --bg:#ffffff; /* Notion-friendly white */
      --fg:#0f172a; /* slate-900 */
      --muted:#64748b; /* slate-500 */
      --ring:#0ea5e9; /* sky-500 */
      --card:#f8fafc; /* slate-50 */
      --border:#e2e8f0; /* slate-200 */
      --accent:#10b981; /* emerald-500 */
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font:16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--fg); background:var(--bg);
      display:flex; align-items:center; justify-content:center; padding:16px;
    }
    .wrap{width:min(1000px, 100%);}
    .header{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      border:1px solid var(--border); background:var(--card); border-radius:16px; padding:12px 16px; 
      box-shadow: 0 1px 2px rgba(2,6,23,.06);
      margin-bottom:12px;
    }
    .title{font-weight:700; letter-spacing:.2px}
    .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    .btn{
      appearance:none; border:1px solid var(--border); background:#fff; color:var(--fg);
      padding:8px 10px; border-radius:10px; font-size:14px; cursor:pointer;
    }
    .btn:hover{border-color:#cbd5e1}
    .grid{
      display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:12px;
    }
    .card{
      border:1px solid var(--border); background:#fff; border-radius:16px; padding:14px 14px;
      box-shadow: 0 1px 2px rgba(2,6,23,.06);
    }
    .name{font-weight:600; font-size:16px; margin-bottom:4px}
    .tz{color:var(--muted); font-size:12px; margin-bottom:10px}
    .time{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; font-weight:700; font-size:22px}
    .footer{color:var(--muted); font-size:11px; text-align:center; margin-top:10px}
    .hidden{display:none}
    @media (prefers-color-scheme: dark){ /* in case your Notion page uses dark embeds */
      :root{ --bg:#0b1220; --fg:#f1f5f9; --muted:#94a3b8; --card:#0f172a; --border:#1e293b; }
      .btn{background:#0f172a; color:var(--fg); border-color:var(--border)}
      .card{background:#0b1220}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title" id="title">Team Timezones</div>
      <div class="controls">
        <button id="toggleFmt" class="btn" title="Toggle 12/24-hour">12‑hour</button>
        <button id="refresh" class="btn" title="Reload team list">Reload</button>
      </div>
    </div>

    <div class="grid" id="grid" role="list"></div>
    <div class="footer" id="footer"></div>
  </div>

  <template id="cardTemplate">
    <div class="card" role="listitem">
      <div class="name"></div>
      <div class="tz"></div>
      <div class="time" aria-live="polite"></div>
    </div>
  </template>

  <script>
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    const elGrid = $('#grid');
    const elFooter = $('#footer');
    const elTitle = $('#title');
    const elToggleFmt = $('#toggleFmt');

    const params = new URLSearchParams(location.search);
    const initialFmt = 12; // Always start with 12-hour format
    const titleParam = params.get('title');
    if (titleParam) elTitle.textContent = titleParam;

    let fmt24 = false; // default to 12-hour clock
    let team = [];

    const demoTeam = [
      { name: 'Krista', tz: 'America/Detroit' },
      { name: 'Omar', tz: 'Europe/Paris' },
      { name: 'Yuki', tz: 'Asia/Tokyo' },
      { name: 'Priya', tz: 'Asia/Kolkata' }
    ];

    function parseTeamFromParams(){
      const tParams = params.getAll('t');
      const listA = tParams.map(v=>{
        const [name, tz] = v.split('|');
        return name && tz ? {name: decodeURIComponent(name), tz: decodeURIComponent(tz)} : null;
      }).filter(Boolean);

      if (listA.length) return listA;

      const json = params.get('team');
      if (json) {
        try { return JSON.parse(json); } catch(e) { console.warn('Invalid team json param', e); }
      }
      return null;
    }

    async function loadTeam(){
      const fromParams = parseTeamFromParams();
      if (fromParams) return fromParams;

      try {
        const res = await fetch('team.json', {cache:'no-store'});
        if (res.ok) {
          const arr = await res.json();
          if (Array.isArray(arr) && arr.length) return arr;
        }
      } catch(e){ /* ignore */ }

      return demoTeam;
    }

    function fmtTime(d, tz){
      const opts = {
        hour:'numeric', minute:'2-digit', second: '2-digit',
        hour12: !fmt24, timeZone: tz
      };
      try {
        return new Intl.DateTimeFormat(undefined, opts).format(d);
      } catch(e){
        return 'Invalid time zone';
      }
    }

    function tick(){
      const now = new Date();
      $$('.card').forEach(card => {
        const tz = card.dataset.tz;
        $('.time', card).textContent = fmtTime(now, tz);
      });
    }

    let timer = null;
    function startClock(){
      if (timer) clearInterval(timer);
      timer = setInterval(tick, 1000);
    }

    function updateFooter(){
      const me = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
      const now = new Date();
      const utc = new Intl.DateTimeFormat(undefined, {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:!fmt24, timeZone:'UTC'}).format(now);
      elFooter.textContent = `Your timezone: ${me} • UTC: ${utc}`;
    }

    elToggleFmt.addEventListener('click', ()=>{
      fmt24 = !fmt24;
      elToggleFmt.textContent = fmt24 ? '24‑hour' : '12‑hour';
      tick(); updateFooter();
    });

    $('#refresh').addEventListener('click', async ()=>{
      team = await loadTeam();
      team = team.filter(x=>x && x.tz);
      team = team.map(x=>({name:x.name||'', tz:x.tz}));
      render(team);
      updateFooter();
    });

    function render(list){
      elGrid.innerHTML = '';
      const tpl = $('#cardTemplate');
      list.forEach(m => {
        const node = tpl.content.firstElementChild.cloneNode(true);
        $('.name', node).textContent = m.name || m.tz || 'Unknown';
        $('.tz', node).textContent = m.tz || '—';
        node.dataset.tz = m.tz;
        elGrid.appendChild(node);
      });
      tick();
    }

    (async function init(){
      if (fmt24) elToggleFmt.textContent = '24‑hour';
      team = await loadTeam();
      team = team.filter(x=>x && x.tz);
      if (!team.length) team = demoTeam;
      render(team);
      startClock();
      updateFooter();
    })();
  </script>
</body>
</html>
